version: '3.8'

# 监控系统配置
# 使用：docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d

services:
  # Prometheus - 指标收集和告警
  prometheus:
    image: prom/prometheus:latest
    container_name: lx_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - lx_network
    labels:
      - "com.lx-proxy.service=prometheus"

  # Grafana - 可视化仪表板
  grafana:
    image: grafana/grafana:latest
    container_name: lx_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=lx_grafana_admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    restart: unless-stopped
    networks:
      - lx_network
    depends_on:
      - prometheus
    labels:
      - "com.lx-proxy.service=grafana"

  # Node Exporter - 系统指标
  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: lx_node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netclass.ignored-devices=^(veth.*|docker.*|br-.*)$$'
    restart: unless-stopped
    networks:
      - lx_network
    labels:
      - "com.lx-proxy.service=node_exporter"

  # Postgres Exporter - 数据库指标
  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: lx_postgres_exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@db:5432/lx_proxy?sslmode=disable
    restart: unless-stopped
    networks:
      - lx_network
    depends_on:
      - db
    labels:
      - "com.lx-proxy.service=postgres_exporter"

  # Alertmanager - 告警管理（可选）
  alertmanager:
    image: prom/alertmanager:latest
    container_name: lx_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - lx_network
    depends_on:
      - prometheus
    labels:
      - "com.lx-proxy.service=alertmanager"

networks:
  lx_network:
    external: true
    name: lx-proxy_lx_network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
