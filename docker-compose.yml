version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  db:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: lx-proxy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lx_proxy}
      POSTGRES_USER: ${POSTGRES_USER:-lx_proxy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lxproxy2026_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/backups
    networks:
      - lx-proxy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lx_proxy} -d ${POSTGRES_DB:-lx_proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lx-proxy-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lx_proxy}:${DB_PASSWORD:-lxproxy2026_secure_password}@db:5432/${POSTGRES_DB:-lx_proxy}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_key_in_production}
      RUST_LOG: ${RUST_LOG:-info}
      HOST: 0.0.0.0
      PORT: ${BACKEND_PORT:-3000}
      XRAY_PATH: /usr/local/bin/xray
      XRAY_CONFIG_PATH: /etc/xray/config.json
      SESSION_TIMEOUT: 24
      MAX_LOGIN_ATTEMPTS: 5
      IP_BAN_DURATION: 60
    volumes:
      - xray_config:/etc/xray
      - ./logs/backend:/app/logs
    networks:
      - lx-proxy-network
    expose:
      - "${BACKEND_PORT:-3000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
    container_name: lx-proxy-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - lx-proxy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== Xray 核心（可选） ====================
  xray:
    image: ${XRAY_IMAGE:-ghcr.io/xtls/xray-core:latest}
    container_name: lx-proxy-xray
    restart: unless-stopped
    profiles:
      - xray
    volumes:
      - xray_config:/etc/xray:ro
      - ./logs/xray:/var/log/xray
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== 定时备份服务（可选） ====================
  backup:
    image: postgres:${POSTGRES_VERSION:-15}-alpine
    container_name: lx-proxy-backup
    restart: unless-stopped
    profiles:
      - backup
    depends_on:
      - db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lx_proxy}
      POSTGRES_USER: ${POSTGRES_USER:-lx_proxy}
      PGPASSWORD: ${DB_PASSWORD:-lxproxy2026_secure_password}
    volumes:
      - ./data/backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    entrypoint: /bin/sh
    command: >
      -c "
      echo '0 3 * * * /backup.sh' > /etc/crontabs/root &&
      crond -f -l 2
      "
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ==================== Nginx Proxy Manager（可选，用于 HTTPS） ====================
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: lx-proxy-nginx-proxy
    restart: unless-stopped
    profiles:
      - proxy
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data/nginx-proxy:/data
      - ./data/letsencrypt:/etc/letsencrypt
    networks:
      - lx-proxy-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local
  xray_config:
    driver: local

# ==================== 网络配置 ====================
networks:
  lx-proxy-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
