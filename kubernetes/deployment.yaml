# P17 高可用部署 - Kubernetes 配置
# 支持自动扩缩容、滚动更新、健康检查

apiVersion: v1
kind: Namespace
metadata:
  name: lxproxy
  labels:
    name: lxproxy

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: lxproxy-config
  namespace: lxproxy
data:
  RUST_LOG: "info"
  HOST: "0.0.0.0"
  PORT: "8080"
  DATABASE_URL: "postgresql://lxproxy:$(POSTGRES_PASSWORD)@postgres:5432/lxproxy"
  REDIS_URL: "redis://redis-sentinel:26379?sentinel=true&sentinelMasterId=mymaster"

---
# Secret - 敏感配置
apiVersion: v1
kind: Secret
metadata:
  name: lxproxy-secrets
  namespace: lxproxy
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-production"
  JWT_SECRET: "change-me-to-a-secure-random-string"
  ENCRYPTION_KEY: "generate-32-byte-hex-key-here"

---
# Deployment - 应用部署
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lxproxy-app
  namespace: lxproxy
  labels:
    app: lxproxy
    component: api
spec:
  replicas: 3  # 3 个副本实现高可用
  selector:
    matchLabels:
      app: lxproxy
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 零停机更新
  template:
    metadata:
      labels:
        app: lxproxy
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: lxproxy
        image: lx-proxy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: lxproxy-config
        - secretRef:
            name: lxproxy-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: lxproxy
                  component: api
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30

---
# Service - 服务暴露
apiVersion: v1
kind: Service
metadata:
  name: lxproxy-service
  namespace: lxproxy
  labels:
    app: lxproxy
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: lxproxy
    component: api

---
# HorizontalPodAutoscaler - 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lxproxy-hpa
  namespace: lxproxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lxproxy-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max

---
# PodDisruptionBudget - Pod 中断预算
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lxproxy-pdb
  namespace: lxproxy
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: lxproxy
      component: api

---
# Ingress - 入口配置
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lxproxy-ingress
  namespace: lxproxy
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.lxproxy.example.com
    secretName: lxproxy-tls
  rules:
  - host: api.lxproxy.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lxproxy-service
            port:
              number: 80
