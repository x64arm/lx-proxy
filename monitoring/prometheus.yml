global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lx-proxy'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scheme: http

  # Node Exporter - 系统指标
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
    metrics_path: /metrics
    scheme: http

  # Postgres Exporter - 数据库指标
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    metrics_path: /metrics
    scheme: http

  # LX-Proxy Backend - 应用指标
  - job_name: 'lx_proxy_backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 10s
    scrape_timeout: 5s
    
    # 重新标记配置
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  # 如果启用了 cAdvisor，添加容器监控
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
