# P17 高可用部署 - Docker Compose 配置
# 支持多实例部署、数据库主从、Redis 哨兵

version: '3.8'

services:
  # ========== 应用服务（多实例） ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lx-proxy:latest
    deploy:
      replicas: 3  # 3 个实例实现高可用
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - DATABASE_URL=postgresql://lxproxy:password@postgres:5432/lxproxy
      - REDIS_URL=redis://redis-sentinel:26379?sentinel=true&sentinelMasterId=mymaster
      - RUST_LOG=info
      - HOST=0.0.0.0
      - PORT=8080
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis-sentinel
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lxproxy-network
    restart: unless-stopped

  # ========== PostgreSQL 主从复制 ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lxproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lxproxy_secure_password}
      POSTGRES_DB: lxproxy
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lxproxy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lxproxy-network
    restart: unless-stopped

  # PostgreSQL 从库（可选，用于读扩展）
  postgres-replica:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lxproxy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lxproxy_secure_password}
      POSTGRES_DB: lxproxy
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    depends_on:
      - postgres
    networks:
      - lxproxy-network
    restart: unless-stopped
    profiles:
      - ha  # 高可用模式启用

  # ========== Redis 哨兵模式 ==========
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-master-data:/data
    networks:
      - lxproxy-network
    restart: unless-stopped

  redis-slave:
    image: redis:7-alpine
    command: redis-server --slaveof redis-master 6379 --appendonly yes
    volumes:
      - redis-slave-data:/data
    depends_on:
      - redis-master
    networks:
      - lxproxy-network
    restart: unless-stopped

  redis-sentinel:
    image: redis:7-alpine
    command: >
      sh -c "redis-sentinel /etc/redis/sentinel.conf"
    volumes:
      - ./scripts/redis/sentinel.conf:/etc/redis/sentinel.conf
    depends_on:
      - redis-master
      - redis-slave
    ports:
      - "26379:26379"
    networks:
      - lxproxy-network
    restart: unless-stopped

  # ========== Nginx 负载均衡 ==========
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - lxproxy-network
    restart: unless-stopped
    profiles:
      - ha  # 高可用模式启用

  # ========== 监控（可选） ==========
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./scripts/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - lxproxy-network
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - lxproxy-network
    restart: unless-stopped
    profiles:
      - monitoring

# ========== 网络配置 ==========
networks:
  lxproxy-network:
    driver: bridge

# ========== 数据卷 ==========
volumes:
  postgres-data:
  postgres-replica-data:
  redis-master-data:
  redis-slave-data:
  prometheus-data:
  grafana-data:
